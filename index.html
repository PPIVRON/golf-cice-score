<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Golf – Score & GPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      box-shadow: 0 0 15px rgba(0,0,0,0.05);
    }

    header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid #e5e7eb;
      background: #111827;
      color: #f9fafb;
    }

    header .course-name {
      font-size: 14px;
      opacity: 0.9;
    }

    header .hole-line {
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 16px;
      font-weight: 600;
    }

    header .hole-line span.small {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.8;
    }

    main {
      flex: 1;
      padding: 10px 14px 72px; /* laisser la place à la nav bas */
      overflow-y: auto;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* --- Vue SCORE --- */

    .score-main {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .score-current {
      background: #f9fafb;
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
    }

    .score-current-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .score-current-top .label {
      font-size: 13px;
      color: #6b7280;
    }

    .score-current-top .total {
      font-size: 13px;
      color: #6b7280;
    }

    .score-current-number {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }

    .score-btn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: none;
      font-size: 22px;
      font-weight: 500;
      color: #111827;
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .score-btn:active {
      transform: scale(0.96);
    }

    .score-value {
      font-size: 32px;
      font-weight: 700;
    }

    .score-extra {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #4b5563;
    }

    .score-extra > div:first-child {
      display: flex;
      align-items: center;
      gap: 6px; /* espace entre Putts, -, 2, + */
    }

    .score-extra span {
      margin-right: 6px;
    }

    .score-extra button {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
    }

    .score-extra .score-btn {
      width: 28px;
      height: 28px;
      font-size: 18px;
    }


    .score-holes {
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 10px;
    }

    .score-holes table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .score-holes th,
    .score-holes td {
      padding: 3px 4px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
    }

    .score-holes th {
      font-weight: 600;
      color: #4b5563;
    }

    .score-holes tr:last-child td {
      border-bottom: none;
    }

    .score-holes input {
      width: 32px;
      text-align: center;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 11px;
      padding: 1px 2px;
    }

    /* --- Vue GPS / CARTE --- */

    .gps-main {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gps-distance {
      background: #111827;
      color: #f9fafb;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .gps-distance .label {
      font-size: 13px;
      opacity: 0.9;
    }

    .gps-distance .value {
      font-size: 26px;
      font-weight: 700;
    }

    .gps-distance .unit {
      font-size: 13px;
      margin-left: 2px;
      opacity: 0.9;
    }

    .gps-status {
      font-size: 12px;
      color: #4b5563;
      margin-top: 4px;
    }

    .gps-card {
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 8px;
    }

    .gps-card img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }

    .gps-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .btn-primary,
    .btn-secondary {
      flex: 1;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 13px;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: #16a34a;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-primary:active,
    .btn-secondary:active {
      transform: scale(0.97);
    }

    .gps-status-line {
      font-size: 12px;
      color: #4b5563;
      margin-top: 6px;
    }

    /* Modal ZOOM (tu réintègres ta logique existante) */

    .modal {
      display: none;
      position: fixed;
      z-index: 50;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: rgba(0,0,0,0.7);
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;        /* largeur fixe */
      max-width: 520px;   /* ou 100% si tu veux plein écran sur mobile */
      height: auto;
      max-height: 90%;
      background-color: #111827;
      border-radius: 10px;
      padding: 8px;
    }


    .modal-content img {
      width: 100%;
      max-height: 100%;
      border-radius: 8px;
      object-fit: contain;
    }

    .modal .close {
      position: absolute;
      top: 8px;
      right: 12px;
      color: #f9fafb;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

   /* --- Vue STATS --- */

    .stats-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stats-summary {
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 10px 12px;
    }

    .stats-summary h2 {
      font-size: 15px;
      margin-bottom: 4px;
    }

    .stats-summary .line {
      font-size: 13px;
      color: #4b5563;
      margin-top: 2px;
    }

    .stats-detail {
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      font-size: 12px;
    }

    .stats-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .stats-detail-row:last-child {
      border-bottom: none;
    }

    /* --- NAVIGATION BAS --- */

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      padding: 6px 6px 8px;
      display: flex;
      justify-content: space-between;
      gap: 6px;
      z-index: 40;
    }

    .nav-btn {
      flex: 1;
      border-radius: 999px;
      border: none;
      padding: 6px 4px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: #6b7280;
      background: #f9fafb;
    }

    .nav-btn span {
      font-size: 11px;
    }

    .nav-btn.active {
      background: #111827;
      color: #f9fafb;
      font-weight: 500;
    }

    
    .players-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }

    .player-tab {
      flex: 1;
      padding: 7px 4px;
      border-radius: 999px;
      border: 2px solid #e5e7eb;
      background: #f9fafb;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-align: center;
      cursor: pointer;
    }

    .player-tab.active {
      border-color: #111827;
      background: #111827;
      color: #f9fafb;
    }

    #rankingBand {
      background: #1f2937;
      color: #f9fafb;
      font-size: 12px;
      padding: 5px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      cursor: pointer;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ranking-item.leader {
      color: #fbbf24; /* or pour le leader */
      font-weight: 700;
    }

    .mark-tooltip {
    background: rgba(245,158,11,0.9);
    border: none;
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 999px;
    box-shadow: none;
  }
    

  </style>

  <!-- Leaflet - à ajouter juste avant </head> -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<div class="app">

  <header>

    </div>

    <div style="margin-top:4px; font-size:12px;">
      <label>
        <input type="radio" name="teeColor" value="white" checked>
        Blanc
      </label>
      <label style="margin-left:8px;">
        <input type="radio" name="teeColor" value="yellow">
        Jaune
      </label>
    </div>

  </header>

  <!-- Bandeau classement multi-joueurs -->
  <div id="rankingBand" style="display:none;">
    <!-- généré dynamiquement -->
  </div>


  <main>
    <!-- Vue SCORE -->
    <section id="view-score" class="view active">

        </div>

              <th>±</th>
            </tr>
            </thead>
            <tbody id="holesTableBody">
            <!-- rempli par JS à partir de tes données courses -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Vue GPS / CARTE -->
    <section id="view-gps" class="view">
      <div class="gps-main">
        <div class="gps-distance">
          <div class="label">Distance au centre du green</div>
          <div>
            <span class="value" id="gpsDistanceValue">‑‑‑</span><span class="unit">m</span>
          </div>
        </div>
        <div class="gps-status">
          <span id="gpsStatus">GPS inactif</span>
        </div>

        <div class="gps-card">
          <div id="mapContainer" style="width:100%; height:300px; border-radius:8px; z-index:1;"></div>

          <!-- Bouton fermeture plein écran -->
          <button id="closeFullscreenBtn" style="
            display: none;
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10000;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
          ">✕ Réduire</button>

          <div class="gps-actions">
            <button class="btn-primary" id="toggleGpsBtn">Activer GPS live</button>
            <button class="btn-secondary" id="fullscreenMapBtn">Plein écran</button>
            <button class="btn-secondary" id="centerMapBtn">📍</button>
            <button class="btn-secondary" id="compassBtn">🧭</button>
          </div>
          <div class="gps-status-line" id="gpsCoordsText">Lat: ‑‑, Lon: ‑‑</div>
          <div class="gps-status-line" id="gpsMarksDistances"></div>
        </div>
      </div>
    </section>


    <!-- Vue STATS -->
    <section id="view-stats" class="view">
      <div class="stats-main">
        <!-- Onglets joueurs stats -->
      <div class="players-tabs" id="statsTabs"></div>
        <div class="stats-summary">
          <h2>Résumé de la partie</h2>
          <div class="line">
            Score total : <span id="statsTotalScore">0</span>
            (<span id="statsTotalVsPar">E</span>)
          </div>
          <div class="line">
            Putts : <span id="statsTotalPutts">0</span>
          </div>
        </div>
        <div class="stats-detail" id="statsDetail">
          <!-- lignes trou par trou générées par JS -->
        </div>
        <!-- Bouton Nouvelle partie -->
        <div style="margin-top: 16px; text-align: center;">
          <button id="btnNewGame" style="
            background: none;
            border: none;
            color: #dc2626;
            font-size: 13px;
            text-decoration: underline;
            cursor: pointer;
          ">↩ Nouvelle partie</button>
        </div>
      </div>
    </section>
  </main>

</div>

<!-- Modal CLASSEMENT -->
<div id="rankingModal" class="modal">
  <div class="modal-content" style="background:#ffffff; color:#111827; max-width:90%; max-height:60%;">
    <span class="close" id="closeRanking">&times;</span>
    <h2 style="font-size:15px; margin-bottom:12px;">Classement</h2>
    <div id="rankingDetail"></div>
  </div>
</div>

<div id="tipsModal" class="modal">
  <div class="modal-content" style="max-width: 90%; max-height: 70%; background:#ffffff; color:#111827;">

    <h2 style="font-size:16px; margin-bottom:8px;">Conseils pour le trou</h2>
    <div id="tipsText" style="font-size:14px; line-height:1.4;"></div>
  </div>
</div>


<!-- Navigation bas -->
<div class="bottom-nav">
  <button class="nav-btn active" data-view="score" id="btnNavScore">

  </button>
  <button class="nav-btn" data-view="gps" id="btnNavGps">
    <span>GPS / Carte</span>
  </button>
  <button class="nav-btn" data-view="stats" id="btnNavStats">
    <span>Stats</span>
  </button>
</div>

  function getCurrentHoleKey() {
    const hole = getCurrentHole();
    return `${currentCourseKey}-${hole.number}`;
  }

  function getCurrentPlayer() {
  return players[currentPlayerIndex];
  }

  function getCurrentPlayerHole() {
    return getCurrentPlayer().holes[currentHoleIndex];
  }

  function renderPlayersTabs() {
    const tabsEl = document.getElementById("playersTabs");
    if (!tabsEl) return;
    tabsEl.innerHTML = "";

    players.forEach((player, index) => {
      const tab = document.createElement("button");
      const isActive = index === currentPlayerIndex;
      const isYellow = player.teeColor === "yellow";

      tab.className = "player-tab" + (isActive ? " active" : "");

      // Couleur de fond selon la couleur de départ
      if (!isActive) {
        tab.style.background = isYellow ? "#fef08a" : "#f9fafb";
        tab.style.color = isYellow ? "#78350f" : "#6b7280";
        tab.style.borderColor = isYellow ? "#fcd34d" : "#e5e7eb";
      }

      tab.textContent = player.trigram;
      tab.addEventListener("click", () => {
        currentPlayerIndex = index;
        currentTeeColor = players[index].teeColor;
        const teeRadio = document.querySelector(`input[name="teeColor"][value="${players[index].teeColor}"]`);
        if (teeRadio) teeRadio.checked = true;
        renderPlayersTabs();
        renderStatsTabs();
        renderHoleScore();
        renderHolesTable();
        renderStatsDetail();
        updateTotals();
        renderHeader();
      });
      tabsEl.appendChild(tab);
    });
  }

   function initCourseTotals() {
    const course = courses[currentCourseKey];

    // Pour chaque joueur, on crée son propre tableau de trous
    players.forEach(player => {
      player.holes = course.holes.map(hole => ({
        number: hole.number,
        par:    hole.par,
        score:  null,
        putts:  null

    });

    updateTotals();

  function renderHeader() {
    const course = getCurrentCourse();
    const hole = getCurrentHole();
    courseNameEl.textContent = course.name;
    holeNumberEl.textContent = hole.number;
    holeParEl.textContent = hole.par;

    const distance = currentTeeColor === "yellow" ? hole.yellow : hole.white;
    const label = currentTeeColor === "yellow" ? "Jaune" : "Blanc";
    holeDistanceEl.textContent = `${distance} m (${label})`;
  }

  function updateTotals() {
    const player = getCurrentPlayer();
    let total = 0;
    let parTotal = 0;
    let totalPutts = 0;

    player.holes.forEach(h => {
      if (h.score !== null && h.score !== undefined) {
        total += h.score;
        parTotal += h.par;
      }
      if (h.putts !== null && h.putts !== undefined) {
        totalPutts += h.putts;
      }
    });

    const diff = total - parTotal;
    const vsParText =
      parTotal === 0
        ? "E"
        : (diff === 0 ? "E" : (diff > 0 ? "+" + diff : diff.toString()));

    totalScoreEls.forEach(el => el.textContent = total);
    totalVsParEls.forEach(el => el.textContent = `(${vsParText})`);

    statsTotalScoreEl.textContent = total;
    statsTotalVsParEl.textContent = vsParText;
    statsTotalPuttsEl.textContent = totalPutts;
  }


  function renderHoleScore() {
    const hole = getCurrentPlayerHole(); // scores/putts du joueur actif

    const displayedScore =
      (hole.score === null || hole.score === undefined) ? getCurrentHole().par : hole.score;
    currentHoleScoreEl.textContent = displayedScore;

    const displayedPutts =
      (hole.putts === null || hole.putts === undefined) ? "-" : hole.putts;
    currentHolePuttsEl.textContent = displayedPutts;
  }


  function renderHolesTable() {
    const player = getCurrentPlayer();
    holesTableBody.innerHTML = "";

    player.holes.forEach((hole, index) => {
      const score = (hole.score === null || hole.score === undefined)
        ? ""
        : hole.score;
      const diff =
        (hole.score === null || hole.score === undefined)
          ? ""
          : hole.score - hole.par;
      const diffText =
        diff === ""
          ? ""
          : (diff === 0 ? "E" : (diff > 0 ? "+" + diff : diff.toString()));

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${hole.number}</td>
        <td>${hole.par}</td>
        <td><input type="number" min="1" data-index="${index}" value="${score}"></td>
        <td>${diffText}</td>
      `;
      holesTableBody.appendChild(tr);
    });

    holesTableBody.querySelectorAll("input").forEach(input => {
      input.addEventListener("change", (e) => {
        const idx = parseInt(e.target.dataset.index, 10);
        const val = parseInt(e.target.value, 10);
        const player = getCurrentPlayer();
        if (!isNaN(val) && val > 0) {
          player.holes[idx].score = val;
        } else {
          player.holes[idx].score = null;
        }
        updateTotals();
        if (idx === currentHoleIndex) {
          renderHoleScore();
        }
        renderHolesTable();
        renderStatsDetail();
      });
    });
  }


  function renderStatsDetail() {
    const player = getCurrentPlayer();
    statsDetailEl.innerHTML = "";

    player.holes.forEach(hole => {
      const score = (hole.score === null || hole.score === undefined)
        ? ""
        : hole.score;

      const diff =
        (hole.score === null || hole.score === undefined)
          ? ""
          : hole.score - hole.par;

      const diffText =
        diff === ""
          ? ""
          : (diff === 0 ? "E" : (diff > 0 ? "+" + diff : diff.toString()));

      const displayText =
        score === ""
          ? "—"
          : `${score} (${diffText || "E"})`;

      const row = document.createElement("div");
      row.className = "stats-detail-row";
      row.innerHTML = `
        <div>Trou ${hole.number}</div>
        <div>${displayText}</div>
      `;
      statsDetailEl.appendChild(row);
    });
  }


 function renderHole() {

  renderHoleScore();

  renderStatsDetail();

 function updateGpsHoleImage() {
  // Réinitialise la carte au nouveau trou
  initMap();
}

  function showView(view) {

  // Swipe gauche/droite pour changer de trou
  let touchStartX = 0;
  let touchEndX = 0;
    document.addEventListener("touchstart", e => {
    if (e.target.closest('#mapContainer')) return;
    touchStartX = e.changedTouches[0].screenX;
  });

  document.addEventListener("touchend", e => {
    if (e.target.closest('#mapContainer')) return;
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  });


  function handleSwipe() {
    const delta = touchEndX - touchStartX;
    if (Math.abs(delta) < 60) return;
    const course = getCurrentCourse();
    if (delta < 0 && currentHoleIndex < course.holes.length - 1) {
      currentHoleIndex++;
      renderHole();
    } else if (delta > 0 && currentHoleIndex > 0) {
      currentHoleIndex--;
      renderHole();
    }
  }

  // --- GPS / watchPosition (reprendre ta logique v12) ---

  function distanceInMeters(lat1, lon1, lat2, lon2) {
    // utiliser ta fonction haversine existante
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat/2) * Math.sin(dLat/2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

   function computeDistancesToMarks(lat, lon) {
    const hole = getCurrentHole();
    const key = `${currentCourseKey}-${hole.number}`;
    const ref = holeImageRefs[key];
    if (!ref || !ref.marks || ref.marks.length === 0) {
      return [];
    }

    const distToGreen = distanceInMeters(lat, lon, hole.greenLat, hole.greenLon);

    return ref.marks
      .filter(mark => {
        const markToGreen = distanceInMeters(mark.lat, mark.lon, hole.greenLat, hole.greenLon);
        return distToGreen > markToGreen;
      })
      .map(mark => {
        const distToMark = distanceInMeters(lat, lon, mark.lat, mark.lon);
        return {
          label: mark.label,
          distance: Math.round(distToMark)
        };
      });
  }



  function renderMarksDistances(lat, lon) {
    const marksDistances = computeDistancesToMarks(lat, lon);
    if (marksDistances.length === 0) {
      gpsMarksDistancesEl.textContent = "";
      return;
    }

    gpsMarksDistancesEl.innerHTML = marksDistances
      .map(m => `${m.label} : ${m.distance} m`)
      .join("<br>");
  }


  function initMap() {
    if (map) {
      map.remove();
      map = null;
      playerMarkerLeaflet = null;
      greenMarkerLeaflet = null;
      marksMarkersLeaflet = [];
    }

    const hole = getCurrentHole();

    map = L.map('mapContainer', {
      zoomControl: false,
      tap: false,
      rotate: true,
      touchRotate: false
    }).setView([hole.greenLat, hole.greenLon], 17);

    setTimeout(() => { map.invalidateSize(); }, 100);

    map.on('dragstart zoomstart', () => {
      userInteracting = true;
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    greenMarkerLeaflet = L.marker([hole.greenLat, hole.greenLon], {
      icon: L.divIcon({
        className: '',
        html: '<div style="font-size:20px;">⛳</div>',
        iconSize: [20, 20],
        iconAnchor: [10, 20]
      })
    }).addTo(map).bindPopup('Green');

    const key = `${currentCourseKey}-${hole.number}`;
    const ref = holeImageRefs[key];
    if (ref && ref.marks) {
      ref.marks.forEach(mark => {
        const m = L.circleMarker([mark.lat, mark.lon], {
          radius: 6,
          fillColor: '#f59e0b',
          color: '#ffffff',
          weight: 2,
          fillOpacity: 1
        }).addTo(map)
          .bindTooltip('...', {
            permanent: true,
            direction: 'right',
            className: 'mark-tooltip'
          });
        marksMarkersLeaflet.push(m);
      });
    }
  }

    function updateMapPosition(lat, lon) {
      if (!map) initMap();

      if (playerMarkerLeaflet) {
        playerMarkerLeaflet.setLatLng([lat, lon]);
      } else {
        playerMarkerLeaflet = L.circleMarker([lat, lon], {
          radius: 8,
          fillColor: '#ef4444',
          color: '#ffffff',
          weight: 2,
          fillOpacity: 1
        }).addTo(map).bindPopup('Vous êtes ici');
      }

      // Mise à jour des tooltips repères
      const hole = getCurrentHole();
      const distToGreen = distanceInMeters(lat, lon, hole.greenLat, hole.greenLon);
      const key = `${currentCourseKey}-${hole.number}`;
      const ref = holeImageRefs[key];

      if (ref && ref.marks) {
        ref.marks.forEach((mark, i) => {
          const m = marksMarkersLeaflet[i];
          if (!m) return;
          const markToGreen = distanceInMeters(mark.lat, mark.lon, hole.greenLat, hole.greenLon);
          const distToMark = distanceInMeters(lat, lon, mark.lat, mark.lon);

          if (distToGreen > markToGreen) {
            m.setStyle({ fillOpacity: 1, opacity: 1 });
            m.setTooltipContent(`${Math.round(distToMark)} m`);
          } else {
            m.setStyle({ fillOpacity: 0, opacity: 0 });
            m.closeTooltip();
          }
        });
      }

      
      if (!userInteracting) {
        map.setView([lat, lon], 17);
      }
    }


  function handleGpsSuccess(pos) {
  const { latitude, longitude, accuracy } = pos.coords;
  gpsCoordsTextEl.textContent = `Lat: ${latitude.toFixed(5)}, Lon: ${longitude.toFixed(5)} (±${Math.round(accuracy)} m)`;
  gpsStatusEl.textContent = "GPS OK";

  const hole = getCurrentHole();
  if (hole.greenLat && hole.greenLon) {
    const d = distanceInMeters(latitude, longitude, hole.greenLat, hole.greenLon);
    gpsDistanceValueEl.textContent = Math.round(d);
  } else {
    gpsDistanceValueEl.textContent = "‑‑‑";
  }

  renderMarksDistances(latitude, longitude);
  updateMapPosition(latitude, longitude);
}



  function handleGpsError(err) {
    gpsStatusEl.textContent = "Erreur GPS : " + err.message;
    gpsDistanceValueEl.textContent = "‑‑‑";
  }


  function startGps() {
    if (!navigator.geolocation) {
      gpsStatusEl.textContent = "GPS non disponible";
      return;
    }
    if (watchId !== null) return;

    gpsStatusEl.textContent = "Recherche du signal…";
    gpsActive = true;
    toggleGpsBtn.textContent = "Arrêter GPS live";

    watchId = navigator.geolocation.watchPosition(
      handleGpsSuccess,
      handleGpsError,
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  function stopGps() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  gpsActive = false;
  toggleGpsBtn.textContent = "Activer GPS live";
  gpsStatusEl.textContent = "GPS inactif";
  gpsDistanceValueEl.textContent = "‑‑‑";
  gpsCoordsTextEl.textContent = "Lat: ‑‑, Lon: ‑‑";
  gpsMarksDistancesEl.textContent = "";
}



  toggleGpsBtn.addEventListener("click", () => {
    if (gpsActive) stopGps();
    else startGps();
  });

 
  function computeRanking() {
    return players
      .map(player => {
        let total = 0;
        let parTotal = 0;
        let holesPlayed = 0;
        player.holes.forEach(h => {
          if (h.score !== null) {
            total += h.score;
            parTotal += h.par;
            holesPlayed++;
          }
        });
        const diff = total - parTotal;
        const diffText = holesPlayed === 0
          ? "—"
          : (diff === 0 ? "E" : (diff > 0 ? "+" + diff : diff.toString()));
        return {
          trigram: player.trigram,
          score: total,
          diffText: diffText,
          holesPlayed: holesPlayed
        };
      })
      .sort((a, b) => a.score - b.score);
  }


  function renderRankingBand() {
    if (players.length <= 1) {
      rankingBandEl.style.display = "none";
      return;
    }

    const ranking = computeRanking();
    rankingBandEl.style.display = "flex";
    rankingBandEl.innerHTML = "";

    ranking.forEach((p, index) => {
      const item = document.createElement("div");
      item.className = "ranking-item";

      // Couleur selon départ du joueur
      const player = players.find(pl => pl.trigram === p.trigram);
      const isYellow = player && player.teeColor === "yellow";

      item.style.color = isYellow ? "#fcd34d" : "#f9fafb";
      if (index === 0) {
        item.style.fontWeight = "700"; // leader en gras
      }

      item.innerHTML = `${p.trigram} <strong>${p.score > 0 ? p.score : "—"}</strong> (${p.diffText})`;
      rankingBandEl.appendChild(item);
    });
  }



  function renderRankingDetail() {
    const ranking = computeRanking();
    rankingDetailEl.innerHTML = "";

    ranking.forEach((p, index) => {
      const row = document.createElement("div");
      row.className = "ranking-row" + (index === 0 ? " leader" : "");
      row.innerHTML = `
        <div class="ranking-pos">${index + 1}</div>
        <div class="ranking-trigram">${p.trigram}</div>
        <div class="ranking-score">${p.score > 0 ? p.score + " (" + p.diffText + ")" : "—"}</div>
      `;
      rankingDetailEl.appendChild(row);
    });
  }

    } else {
      container.style.height = "100vh";
      container.style.position = "fixed";
      container.style.top = "0";

      container.style.width = "100%";

  // --- Bouton fermeture plein écran ---
  document.getElementById("closeFullscreenBtn").addEventListener("click", () => {
    const container = document.getElementById("mapContainer");
    container.style.height = "300px";
    container.style.position = "relative";
    container.style.top = "";
    container.style.left = "";
    container.style.zIndex = "1";
    container.style.width = "100%";
    document.getElementById("closeFullscreenBtn").style.display = "none";
    document.getElementById("fullscreenMapBtn").textContent = "Plein écran";
    setTimeout(() => { if (map) map.invalidateSize(); }, 100);
  });

  document.getElementById("centerMapBtn").addEventListener("click", () => {
    if (!map || !playerMarkerLeaflet) return;
    userInteracting = false; // reprend le suivi auto
    map.setView(playerMarkerLeaflet.getLatLng(), 17);
  });

  // --- Boussole globale ---
  function activerBoussole() {
    window.addEventListener('deviceorientation', (e) => {
      if (!map || userInteracting) return;
      if (e.webkitCompassHeading !== null && e.webkitCompassHeading !== undefined) {
        map.setBearing(-e.webkitCompassHeading);
      }
    });
  }

  document.getElementById("compassBtn").addEventListener("click", () => {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(response => {
          if (response === 'granted') {
            activerBoussole();
            document.getElementById("compassBtn").textContent = "🧭✅";
          } else {
            document.getElementById("compassBtn").textContent = "🧭❌";
          }
        });
    } else {
      activerBoussole();
      document.getElementById("compassBtn").textContent = "🧭✅";
    }
  });

  // --- Init ---

  const teeRadioInit = document.querySelector(`input[name="teeColor"][value="${currentTeeColor}"]`);
  if (teeRadioInit) teeRadioInit.checked = true;

  initCourseTotals();
  renderHole();
  showView("score");
