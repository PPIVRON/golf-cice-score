<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Golf – Score & GPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      box-shadow: 0 0 15px rgba(0,0,0,0.05);
    }

    header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid #e5e7eb;
      background: #111827;
      color: #f9fafb;
    }

    header .course-name {
      font-size: 14px;
      opacity: 0.9;
    }

    header .hole-line {
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 16px;
      font-weight: 600;
    }

    header .hole-line span.small {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.8;
    }

    main {
      flex: 1;
      padding: 10px 14px 72px; /* laisser la place à la nav bas */
      overflow-y: auto;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* --- Vue SCORE --- */

    .score-main {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .score-current {
      background: #f9fafb;
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
    }

    .score-current-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .score-current-top .label {
      font-size: 13px;
      color: #6b7280;
    }

    .score-current-top .total {
      font-size: 13px;
      color: #6b7280;
    }

    .score-current-number {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }

    .score-btn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: none;
      font-size: 22px;
      font-weight: 500;
      color: #111827;
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .score-btn:active {
      transform: scale(0.96);
    }

    .score-value {
      font-size: 32px;
      font-weight: 700;
    }

    .score-extra {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #4b5563;
    }

    .score-extra > div:first-child {
      display: flex;
      align-items: center;
      gap: 6px; /* espace entre Putts, -, 2, + */
    }

    .score-extra span {
      margin-right: 6px;
    }

    .score-extra button {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
    }

    .score-extra .score-btn {
      width: 28px;
      height: 28px;
      font-size: 18px;
    }


    .score-holes {
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 10px;
    }

    .score-holes table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .score-holes th,
    .score-holes td {
      padding: 3px 4px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
    }

    .score-holes th {
      font-weight: 600;
      color: #4b5563;
    }

    .score-holes tr:last-child td {
      border-bottom: none;
    }

    .score-holes input {
      width: 32px;
      text-align: center;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 11px;
      padding: 1px 2px;
    }

    /* --- Vue GPS / CARTE --- */

    .gps-main {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gps-distance {
      background: #111827;
      color: #f9fafb;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .gps-distance .label {
      font-size: 13px;
      opacity: 0.9;
    }

    .gps-distance .value {
      font-size: 26px;
      font-weight: 700;
    }

    .gps-distance .unit {
      font-size: 13px;
      margin-left: 2px;
      opacity: 0.9;
    }

    .gps-status {
      font-size: 12px;
      color: #4b5563;
      margin-top: 4px;
    }

    .gps-card {
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 8px;
    }

    .gps-card img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }

    .gps-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .btn-primary,
    .btn-secondary {
      flex: 1;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 13px;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: #16a34a;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-primary:active,
    .btn-secondary:active {
      transform: scale(0.97);
    }

    .gps-status-line {
      font-size: 12px;
      color: #4b5563;
      margin-top: 6px;
    }

    /* Modal ZOOM (tu réintègres ta logique existante) */

    .modal {
      display: none;
      position: fixed;
      z-index: 50;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: rgba(0,0,0,0.7);
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;        /* largeur fixe */
      max-width: 520px;   /* ou 100% si tu veux plein écran sur mobile */
      height: auto;
      max-height: 90%;
      background-color: #111827;
      border-radius: 10px;
      padding: 8px;
    }


    .modal-content img {
      width: 100%;
      max-height: 100%;
      border-radius: 8px;
      object-fit: contain;
    }

    .modal .close {
      position: absolute;
      top: 8px;
      right: 12px;
      color: #f9fafb;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    #playerMarker,
    #markerDistance {
      position: absolute;
      transform: translate(-50%, -100%);
      pointer-events: none;
    }

    #playerMarker {
      width: 12px;
      height: 12px;
      background: #ef4444;
      border-radius: 999px;
      border: 2px solid #f9fafb;
    }

    #markerDistance {
      background: rgba(0,0,0,0.8);
      color: #f9fafb;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 11px;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    /* --- Vue STATS --- */

    .stats-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stats-summary {
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 10px 12px;
    }

    .stats-summary h2 {
      font-size: 15px;
      margin-bottom: 4px;
    }

    .stats-summary .line {
      font-size: 13px;
      color: #4b5563;
      margin-top: 2px;
    }

    .stats-detail {
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      font-size: 12px;
    }

    .stats-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .stats-detail-row:last-child {
      border-bottom: none;
    }

    /* --- NAVIGATION BAS --- */

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      padding: 6px 6px 8px;
      display: flex;
      justify-content: space-between;
      gap: 6px;
      z-index: 40;
    }

    .nav-btn {
      flex: 1;
      border-radius: 999px;
      border: none;
      padding: 6px 4px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: #6b7280;
      background: #f9fafb;
    }

    .nav-btn span {
      font-size: 11px;
    }

    .nav-btn.active {
      background: #111827;
      color: #f9fafb;
      font-weight: 500;
    }

    #marksContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .mark-badge {
      position: absolute;
      transform: translate(-50%, -100%);
      background: rgba(15,23,42,0.9);
      color: #f9fafb;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 11px;
      white-space: nowrap;
    }

    .players-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }

    .player-tab {
      flex: 1;
      padding: 7px 4px;
      border-radius: 999px;
      border: 2px solid #e5e7eb;
      background: #f9fafb;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-align: center;
      cursor: pointer;
    }

    .player-tab.active {
      border-color: #111827;
      background: #111827;
      color: #f9fafb;
    }

    #rankingBand {
      background: #1f2937;
      color: #f9fafb;
      font-size: 12px;
      padding: 5px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      cursor: pointer;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ranking-item.leader {
      color: #fbbf24; /* or pour le leader */
      font-weight: 700;
    }

    

  </style>
</head>

<div class="app">

  <header>

      </label>
    </div>

  <!-- Bandeau classement multi-joueurs -->

            <!-- rempli par JS à partir de tes données courses -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Vue GPS / CARTE -->
    <section id="view-gps" class="view">

          <div class="gps-status-line" id="gpsMarksDistances"></div> <!-- NOUVEAU -->
        </div>
      </div>
    </section>


    <!-- Vue STATS -->
    <section id="view-stats" class="view">
      <div class="stats-main">
        <!-- Onglets joueurs stats -->
      <div class="players-tabs" id="statsTabs"></div>
        <div class="stats-summary">
          <h2>Résumé de la partie</h2>
          <div class="line">
            Score total : <span id="statsTotalScore">0</span>
            (<span id="statsTotalVsPar">E</span>)
          </div>
          <div class="line">
            Putts : <span id="statsTotalPutts">0</span>
          </div>
        </div>
        <div class="stats-detail" id="statsDetail">
          <!-- lignes trou par trou générées par JS -->
        </div>
        <!-- Bouton Nouvelle partie -->
        <div style="margin-top: 16px; text-align: center;">

            background: none;

        </div>
      </div>
    </section>
  </main>

</div>

   function initCourseTotals() {
    const course = courses[currentCourseKey];

    // Pour chaque joueur, on crée son propre tableau de trous
    players.forEach(player => {
      player.holes = course.holes.map(hole => ({
        number: hole.number,
        par:    hole.par,
        score:  null,
        putts:  null
      }));
    });

    updateTotals();
  }


  function renderHeader() {
    const course = getCurrentCourse();
    const hole = getCurrentHole();
    courseNameEl.textContent = course.name;
    holeNumberEl.textContent = hole.number;
    holeParEl.textContent = hole.par;

    const distance = currentTeeColor === "yellow" ? hole.yellow : hole.white;
    const label = currentTeeColor === "yellow" ? "Jaune" : "Blanc";
    holeDistanceEl.textContent = `${distance} m (${label})`;
  }

  function updateTotals() {
    const player = getCurrentPlayer();
    let total = 0;
    let parTotal = 0;
    let totalPutts = 0;

    player.holes.forEach(h => {
      if (h.score !== null && h.score !== undefined) {
        total += h.score;
        parTotal += h.par;
      }
      if (h.putts !== null && h.putts !== undefined) {
        totalPutts += h.putts;
      }
    });

    const diff = total - parTotal;
    const vsParText =
      parTotal === 0
        ? "E"
        : (diff === 0 ? "E" : (diff > 0 ? "+" + diff : diff.toString()));

    totalScoreEls.forEach(el => el.textContent = total);
    totalVsParEls.forEach(el => el.textContent = `(${vsParText})`);

    statsTotalScoreEl.textContent = total;
    statsTotalVsParEl.textContent = vsParText;
    statsTotalPuttsEl.textContent = totalPutts;
  }


  function renderHoleScore() {
    const hole = getCurrentPlayerHole(); // scores/putts du joueur actif

    const displayedScore =
      (hole.score === null || hole.score === undefined) ? getCurrentHole().par : hole.score;
    currentHoleScoreEl.textContent = displayedScore;

    const displayedPutts =
      (hole.putts === null || hole.putts === undefined) ? "-" : hole.putts;
    currentHolePuttsEl.textContent = displayedPutts;
  }


  function renderHolesTable() {
    const player = getCurrentPlayer();
    holesTableBody.innerHTML = "";

    player.holes.forEach((hole, index) => {
      const score = (hole.score === null || hole.score === undefined)
        ? ""
        : hole.score;
      const diff =
        (hole.score === null || hole.score === undefined)
          ? ""
          : hole.score - hole.par;
      const diffText =
        diff === ""
          ? ""
          : (diff === 0 ? "E" : (diff > 0 ? "+" + diff : diff.toString()));

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${hole.number}</td>
        <td>${hole.par}</td>
        <td><input type="number" min="1" data-index="${index}" value="${score}"></td>
        <td>${diffText}</td>
      `;
      holesTableBody.appendChild(tr);
    });

    holesTableBody.querySelectorAll("input").forEach(input => {
      input.addEventListener("change", (e) => {
        const idx = parseInt(e.target.dataset.index, 10);
        const val = parseInt(e.target.value, 10);
        const player = getCurrentPlayer();
        if (!isNaN(val) && val > 0) {
          player.holes[idx].score = val;
        } else {
          player.holes[idx].score = null;
        }
        updateTotals();
        if (idx === currentHoleIndex) {
          renderHoleScore();
        }
        renderHolesTable();
        renderStatsDetail();
      });
    });
  }


  function renderStatsDetail() {
    const player = getCurrentPlayer();
    statsDetailEl.innerHTML = "";

    player.holes.forEach(hole => {
      const score = (hole.score === null || hole.score === undefined)
        ? ""
        : hole.score;

      const diff =
        (hole.score === null || hole.score === undefined)
          ? ""
          : hole.score - hole.par;

      const diffText =
        diff === ""
          ? ""
          : (diff === 0 ? "E" : (diff > 0 ? "+" + diff : diff.toString()));

      const displayText =
        score === ""
          ? "—"
          : `${score} (${diffText || "E"})`;

      const row = document.createElement("div");
      row.className = "stats-detail-row";
      row.innerHTML = `
        <div>Trou ${hole.number}</div>
        <div>${displayText}</div>
      `;
      statsDetailEl.appendChild(row);
    });
  }

  // Swipe gauche/droite pour changer de trou
  let touchStartX = 0;
  let touchEndX = 0;
  document.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
  });
  document.addEventListener("touchend", e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  });

  function handleSwipe() {
    const delta = touchEndX - touchStartX;
    if (Math.abs(delta) < 60) return;
    const course = getCurrentCourse();
    if (delta < 0 && currentHoleIndex < course.holes.length - 1) {
      currentHoleIndex++;
      renderHole();
    } else if (delta > 0 && currentHoleIndex > 0) {
      currentHoleIndex--;
      renderHole();
    }
  }

  // --- GPS / watchPosition (reprendre ta logique v12) ---

  function distanceInMeters(lat1, lon1, lat2, lon2) {
    // utiliser ta fonction haversine existante
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat/2) * Math.sin(dLat/2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function computeDistancesToMarks(lat, lon) {
    const hole = getCurrentHole();
    const key = `${currentCourseKey}-${hole.number}`;
    const ref = holeImageRefs[key];
    if (!ref || !ref.marks || ref.marks.length === 0) {
      return [];
    }

    return ref.marks.map(mark => {
      const d = distanceInMeters(lat, lon, mark.lat, mark.lon);
      return {
        label: mark.label,
        distance: Math.round(d)
      };
    });
  }

  function renderMarksDistances(lat, lon) {
    const marksDistances = computeDistancesToMarks(lat, lon);
    if (marksDistances.length === 0) {
      gpsMarksDistancesEl.textContent = "";
      return;
    }

    // Une ligne par repère
    gpsMarksDistancesEl.innerHTML = marksDistances
      .map(m => `${m.label} : ${m.distance} m`)
      .join("<br>");
  }



  function handleGpsSuccess(pos) {
    const { latitude, longitude, accuracy } = pos.coords;
    gpsCoordsTextEl.textContent = `Lat: ${latitude.toFixed(5)}, Lon: ${longitude.toFixed(5)} (±${Math.round(accuracy)} m)`;
    gpsStatusEl.textContent = "GPS OK";

    const hole = getCurrentHole();
    if (hole.greenLat && hole.greenLon) {
      const d = distanceInMeters(latitude, longitude, hole.greenLat, hole.greenLon);
      gpsDistanceValueEl.textContent = Math.round(d);
      updateMarkerPositionFromGps(latitude, longitude, d);
    } else {
      gpsDistanceValueEl.textContent = "‑‑‑";
      hideMarker();
    }

    renderMarksDistances(latitude, longitude);
    renderMarksBadges(latitude, longitude);    // badges sur la carte zoom
  }


  function handleGpsError(err) {
    gpsStatusEl.textContent = "Erreur GPS : " + err.message;
    gpsDistanceValueEl.textContent = "‑‑‑";
    hideMarker();
  }

  function startGps() {
    if (!navigator.geolocation) {
      gpsStatusEl.textContent = "GPS non disponible";
      return;
    }
    if (watchId !== null) return;

    gpsStatusEl.textContent = "Recherche du signal…";
    gpsActive = true;
    toggleGpsBtn.textContent = "Arrêter GPS live";

    watchId = navigator.geolocation.watchPosition(
      handleGpsSuccess,
      handleGpsError,
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  function stopGps() {
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
    gpsActive = false;
    toggleGpsBtn.textContent = "Activer GPS live";
    gpsStatusEl.textContent = "GPS inactif";
    gpsDistanceValueEl.textContent = "‑‑‑";
    gpsCoordsTextEl.textContent = "Lat: ‑‑, Lon: ‑‑";
    gpsMarksDistancesEl.textContent = ""; // <-- ICI, juste avant hideMarker
    marksContainerEl.innerHTML = "";
    hideMarker();
  }


  toggleGpsBtn.addEventListener("click", () => {
    if (gpsActive) stopGps();
    else startGps();
  });

  // --- ZOOM modal (réutilise ta fonction de projection lat/lon -> x/y) ---

  function updateMarkerPositionFromGps(lat, lon, distToGreen) {
    // ici tu réutilises ton latLonToImagePercent(hole, lat, lon)
    // pour obtenir (xPercent, yPercent)
    const hole = getCurrentHole();
    const { xPercent, yPercent } = latLonToImagePercent(hole, lat, lon);
    const imgRect = holeImageEl.getBoundingClientRect();

    const x = imgRect.left + (imgRect.width * xPercent);
    const y = imgRect.top + (imgRect.height * yPercent);

    playerMarkerEl.style.left = `${x}px`;
    playerMarkerEl.style.top = `${y}px`;
    markerDistanceEl.style.left = `${x}px`;
    markerDistanceEl.style.top = `${y - 16}px`;
    markerDistanceEl.textContent = `${Math.round(distToGreen)} m`;
  }

  function renderMarksBadges(lat, lon) {
    const hole = getCurrentHole();
    const key = `${currentCourseKey}-${hole.number}`;
    const ref = holeImageRefs[key];
    if (!ref || !ref.marks || ref.marks.length === 0) {
      marksContainerEl.innerHTML = "";
      return;
    }

    marksContainerEl.innerHTML = "";

    const imgRect = holeImageEl.getBoundingClientRect();

    ref.marks.forEach(mark => {
      const d = distanceInMeters(lat, lon, mark.lat, mark.lon);
      const x = imgRect.left + imgRect.width * mark.img.x;
      const y = imgRect.top + imgRect.height * mark.img.y;

      const badge = document.createElement("div");
      badge.className = "mark-badge";
      badge.style.left = `${x}px`;
      badge.style.top = `${y}px`;
      badge.textContent = `${mark.label} : ${Math.round(d)} m`;
      marksContainerEl.appendChild(badge);
    });
  }


  function hideMarker() {
    playerMarkerEl.style.left = "-1000px";
    playerMarkerEl.style.top = "-1000px";
    markerDistanceEl.style.left = "-1000px";
    markerDistanceEl.style.top = "-1000px";
  }

  function latLonToImagePercent(hole, lat, lon) {
  const key = `${currentCourseKey}-${hole.number}`;
  const ref = holeImageRefs[key];
  if (!ref || !ref.green) {
    return { xPercent: 0.5, yPercent: 0.5 };
  }

  // Cas spécial : Cicé trou 1, projection 2D un peu plus riche
  if (key === "cice-1") {
    return latLonToImagePercentCice1(lat, lon, ref);
  }

  // Cas général (autres trous) : projection simple le long de la ligne repère -> green
  const g = ref.green;
  const m = (ref.marks && ref.marks.length > 0) ? ref.marks[0] : null;

  if (!m) {
    return {
      xPercent: g.img.x,
      yPercent: g.img.y
    };
  }

  const dxGps = g.lon - m.lon;
  const dyGps = g.lat - m.lat;
  const dxImg = g.img.x - m.img.x;
  const dyImg = g.img.y - m.img.y;

  const denom = (dxGps * dxGps + dyGps * dyGps);
  if (denom === 0) {
    return {
      xPercent: g.img.x,
      yPercent: g.img.y
    };
  }

  const uxGps = dxGps / Math.sqrt(denom);
  const uyGps = dyGps / Math.sqrt(denom);

  const vxGps = lon - m.lon;
  const vyGps = lat - m.lat;

  const proj = vxGps * uxGps + vyGps * uyGps;
  const length = Math.sqrt(denom);
  const t = proj / length;

  const x = m.img.x + dxImg * t;
  const y = m.img.y + dyImg * t;

  return {
    xPercent: x,
    yPercent: y
  };
}

  function latLonToImagePercentCice1(lat, lon, ref) {
  const g = ref.green;
  const m = (ref.marks && ref.marks.length > 0) ? ref.marks[0] : null;

  if (!m) {
    return { xPercent: g.img.x, yPercent: g.img.y };
  }

  // 1) Repère -> green en coordonnées GPS
  const dxGps = g.lon - m.lon;
  const dyGps = g.lat - m.lat;
  const distGps = Math.sqrt(dxGps * dxGps + dyGps * dyGps) || 1;

  const uxGps = dxGps / distGps;
  const uyGps = dyGps / distGps;

  // 2) Position joueur par rapport au repère
  const vxGps = lon - m.lon;
  const vyGps = lat - m.lat;

  // Composante le long de l'axe repère->green
  const proj = vxGps * uxGps + vyGps * uyGps;
  const t = proj / distGps; // 0 = repère, 1 = green (approx)

  // Composante latérale (perpendiculaire à l'axe)
  const perpX = -uyGps;
  const perpY = uxGps;
  const lateral = vxGps * perpX + vyGps * perpY;

  // 3) Axe image repère->green
  const dxImg = g.img.x - m.img.x;
  const dyImg = g.img.y - m.img.y;

  const distImg = Math.sqrt(dxImg * dxImg + dyImg * dyImg) || 1;
  const uxImg = dxImg / distImg;
  const uyImg = dyImg / distImg;

  // Échelles
  const scaleLongitudinal = distImg / distGps;
  const scaleLateral = scaleLongitudinal * lateralFactorCice1;

  // Position sur l’image :
  // - m.img + t * axe repère->green (longitudinal)
  // - + (lateral * scaleLateral) * direction perpendiculaire image
  const x = m.img.x + dxImg * t + (lateral * scaleLateral) * (-uyImg);
  const y = m.img.y + dyImg * t + (lateral * scaleLateral) * (uxImg);

  return {
    xPercent: x,
    yPercent: y
  };
}

  function computeRanking() {
    return players
      .map(player => {
        let total = 0;
        let parTotal = 0;
        let holesPlayed = 0;
        player.holes.forEach(h => {
          if (h.score !== null) {
            total += h.score;
            parTotal += h.par;
            holesPlayed++;
          }
        });
        const diff = total - parTotal;
        const diffText = holesPlayed === 0
          ? "—"
          : (diff === 0 ? "E" : (diff > 0 ? "+" + diff : diff.toString()));
        return {
          trigram: player.trigram,
          score: total,
          diffText: diffText,
          holesPlayed: holesPlayed
        };
      })
      .sort((a, b) => a.score - b.score);
  }


  function renderRankingBand() {
    if (players.length <= 1) {
      rankingBandEl.style.display = "none";
      return;
    }

    const ranking = computeRanking();
    rankingBandEl.style.display = "flex";
    rankingBandEl.innerHTML = "";

    ranking.forEach((p, index) => {
      const item = document.createElement("div");
      item.className = "ranking-item" + (index === 0 ? " leader" : "");
      item.innerHTML = `${p.trigram} <strong>${p.score > 0 ? p.score : "—"}</strong> (${p.diffText})`;
      rankingBandEl.appendChild(item);
    });
  }


  function renderRankingDetail() {
    const ranking = computeRanking();
    rankingDetailEl.innerHTML = "";

    ranking.forEach((p, index) => {
      const row = document.createElement("div");
      row.className = "ranking-row" + (index === 0 ? " leader" : "");
      row.innerHTML = `
        <div class="ranking-pos">${index + 1}</div>
        <div class="ranking-trigram">${p.trigram}</div>
        <div class="ranking-score">${p.score > 0 ? p.score + " (" + p.diffText + ")" : "—"}</div>
      `;
      rankingDetailEl.appendChild(row);
    });
  }
